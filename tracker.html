*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:#050b14;
  color:#e8edf5;
  line-height:1.5;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:"";position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 15% 20%,rgba(16,185,129,0.10) 0%,transparent 45%),
    radial-gradient(ellipse at 85% 80%,rgba(59,130,246,0.08) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;z-index:1;}
.login-box{background:rgba(7,17,27,0.7);backdrop-filter:blur(20px);border:1px solid rgba(16,185,129,0.2);border-radius:16px;padding:48px 40px;width:380px;text-align:center;}
.login-logo{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:700;letter-spacing:0.2em;color:#10b981;}
.login-sub{font-size:13px;color:#94a3b8;margin:8px 0 32px;letter-spacing:0.05em;}
.login-box input{display:block;width:100%;padding:12px 16px;margin-bottom:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e8edf5;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.login-box input:focus{border-color:rgba(16,185,129,0.5);}
.login-box button[type="submit"]{width:100%;padding:12px;background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:8px;color:white;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.1em;cursor:pointer;transition:opacity 0.2s;}
.login-box button:hover{opacity:0.9;}
.login-box button:disabled{opacity:0.5;cursor:default;}
.login-err{color:#f87171;font-size:12px;margin-bottom:12px;text-align:left;}
.login-toggle{margin-top:20px;font-size:12px;color:#94a3b8;cursor:pointer;}
.login-toggle:hover{color:#10b981;}

/* Loading */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;position:relative;z-index:1;}
.loading-text{font-family:'Orbitron',sans-serif;font-size:16px;letter-spacing:0.3em;color:#10b981;}
.loading-dots{display:flex;gap:6px;margin-top:16px;}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:#10b981;animation:pulse 1.2s infinite;}
.loading-dots span:nth-child(2){animation-delay:0.2s;}
.loading-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes pulse{0%,80%,100%{opacity:0.3;transform:scale(0.8);}40%{opacity:1;transform:scale(1.2);}}

/* Header */
.app-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:rgba(5,11,20,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(16,185,129,0.15);}
.app-brand{display:flex;align-items:center;gap:10px;}
.brand-icon{font-size:20px;color:#10b981;}
.brand-text{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.2em;color:#10b981;}
.brand-divider{color:rgba(255,255,255,0.15);font-weight:300;}
.brand-name{font-size:13px;color:#94a3b8;letter-spacing:0.05em;}
.app-header-right{display:flex;align-items:center;gap:8px;}
.view-btn{padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#94a3b8;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.view-btn.active{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.3);color:#10b981;}
.view-btn:hover{border-color:rgba(16,185,129,0.3);}
.btn-add{padding:6px 16px;border-radius:6px;border:none;background:linear-gradient(135deg,#10b981,#059669);color:white;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:0.05em;}
.btn-add:hover{opacity:0.9;}
.btn-logout{padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:#64748b;font-size:11px;cursor:pointer;}
.btn-logout:hover{color:#f87171;border-color:rgba(248,113,113,0.3);}

/* Stats strip */
.stats-strip{display:flex;gap:12px;padding:20px 28px;position:relative;z-index:1;}
.stat-card{flex:1;background:rgba(7,17,27,0.5);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px 20px;text-align:center;}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;line-height:1;}
.stat-lbl{font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:#94a3b8;margin-top:6px;}

/* Controls */
.controls-bar{display:flex;gap:12px;padding:0 28px 16px;position:relative;z-index:1;}
.search-input{flex:1;padding:10px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e8edf5;font-size:13px;font-family:inherit;outline:none;}
.search-input:focus{border-color:rgba(16,185,129,0.4);}
.search-input::placeholder{color:#64748b;}
.filter-select{padding:10px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e8edf5;font-size:13px;font-family:inherit;outline:none;min-width:200px;}

/* Pipeline view */
.pipeline{display:flex;gap:16px;padding:0 28px 28px;overflow-x:auto;position:relative;z-index:1;min-height:60vh;}
.pipeline-col{min-width:260px;max-width:300px;flex:1;}
.pipeline-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px;}
.pipeline-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:#64748b;}
.pipeline-cards{display:flex;flex-direction:column;gap:10px;}

.job-card-title{font-size:14px;font-weight:600;color:#f0fdf4;margin-bottom:4px;line-height:1.3;}
.job-card-org{font-size:12px;color:#94a3b8;margin-bottom:8px;}

.job-card-meta span{font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,0.05);color:#94a3b8;}
.job-card-bottom{display:flex;align-items:center;justify-content:space-between;}
.job-card-docs{display:flex;gap:4px;}

.doc-resume{background:rgba(16,185,129,0.2);color:#34d399;}
.doc-cover{background:rgba(168,85,247,0.2);color:#c084fc;}
.doc-quest{background:rgba(245,158,11,0.2);color:#fbbf24;}
.job-card-deadline{font-size:11px;color:#64748b;font-family:'JetBrains Mono',monospace;}

.list-view{padding:0 28px 28px;position:relative;z-index:1;}
.list-view table{width:100%;border-collapse:collapse;background:rgba(7,17,27,0.5);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);}

.list-row{cursor:pointer;transition:background 0.15s;}

.modal-close{background:transparent;border:none;color:#64748b;font-size:20px;cursor:pointer;padding:4px 8px;}
.modal-close:hover{color:#f87171;}

.modal-tabs{display:flex;gap:0;padding:0 24px;border-bottom:1px solid rgba(255,255,255,0.06);}
.modal-tab{padding:10px 16px;font-size:12px;font-weight:500;color:#64748b;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.2s;}
.modal-tab.active{color:#10b981;border-bottom-color:#10b981;}
.modal-tab:hover{color:#94a3b8;}

.modal-body{padding:20px 24px;flex:1;overflow-y:auto;}
.form-row{margin-bottom:14px;}
.form-row label{display:block;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#64748b;margin-bottom:5px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#e8edf5;font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:rgba(16,185,129,0.4);}
.form-row textarea{resize:vertical;line-height:1.5;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
.input-with-link{display:flex;gap:8px;align-items:center;}
.input-with-link input{flex:1;}
.ext-link{color:#10b981;font-size:16px;text-decoration:none;flex-shrink:0;}
.ext-link:hover{opacity:0.7;}

.doc-checks{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;}
.check-row{display:flex;align-items:center;gap:8px;font-size:13px;color:#94a3b8;cursor:pointer;}
.check-row input[type="checkbox"]{accent-color:#10b981;width:16px;height:16px;}

.mailto-btn{display:inline-block;padding:12px 24px;border-radius:8px;background:linear-gradient(135deg,#10b981,#059669);color:white;font-size:13px;font-weight:600;text-decoration:none;margin-top:12px;letter-spacing:0.04em;transition:opacity 0.2s;}
.mailto-btn:hover{opacity:0.9;}
.portal-btn{background:linear-gradient(135deg,#3b82f6,#2563eb);}

.modal-footer{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-top:1px solid rgba(255,255,255,0.06);}
.modal-footer div{display:flex;gap:8px;}
.btn-save{padding:8px 20px;border-radius:6px;border:none;background:linear-gradient(135deg,#10b981,#059669);color:white;font-size:12px;font-weight:600;cursor:pointer;}
.btn-cancel{padding:8px 20px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#94a3b8;font-size:12px;cursor:pointer;}
.btn-delete{padding:8px 16px;border-radius:6px;border:1px solid rgba(248,113,113,0.3);background:transparent;color:#f87171;font-size:12px;cursor:pointer;}
.btn-delete:hover{background:rgba(248,113,113,0.1);}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(16,185,129,0.25);border-radius:3px;}

/* Responsive */
@media(max-width:768px){
  .stats-strip{flex-wrap:wrap;}
  .stat-card{min-width:calc(50% - 6px);}
  .pipeline{flex-direction:column;}
  .pipeline-col{min-width:100%;max-width:100%;}
  .form-grid{grid-template-columns:1fr;}
  .modal{max-width:100%;margin:10px;}
  .app-header{flex-direction:column;gap:12px;text-align:center;}
  .app-header-right{flex-wrap:wrap;justify-content:center;}
  .list-view{overflow-x:auto;}
}
</style>

const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6bGl5ZGNybGhpb3JhZHdhY21kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMDc5ODksImV4cCI6MjA5MDU4Mzk4OX0.c0oNE6Y5xWgiYPjok5ODSeH4nAJhSVyfOKghsR-Mp_0";

// Auth helpers
function authHeaders(token) {
  return {
    "apikey": SKEY,
    "Authorization": "Bearer " + token,
    "Content-Type": "application/json"
  };
}
async function signIn(email, password) {
  const r = await fetch(SURL + "/auth/v1/token?grant_type=password", {
    method: "POST",
    headers: {
      "apikey": SKEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email,
      password
    })
  });
  if (!r.ok) {
    const e = await r.json();
    throw new Error(e.error_description || e.msg || "Login failed");
  }
  return r.json();
}
async function signUp(email, password) {
  const r = await fetch(SURL + "/auth/v1/signup", {
    method: "POST",
    headers: {
      "apikey": SKEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email,
      password
    })
  });
  if (!r.ok) {
    const e = await r.json();
    throw new Error(e.error_description || e.msg || "Signup failed");
  }
  return r.json();
}
async function refreshToken(rt) {
  const r = await fetch(SURL + "/auth/v1/token?grant_type=refresh_token", {
    method: "POST",
    headers: {
      "apikey": SKEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      refresh_token: rt
    })
  });
  if (!r.ok) return null;
  return r.json();
}

// Data helpers
async function sGet(table, token) {
  try {
    const r = await fetch(SURL + "/rest/v1/" + table + "?select=*&order=created_at.desc", {
      headers: authHeaders(token)
    });
    return r.ok ? await r.json() : [];
  } catch {
    return [];
  }
}
async function sUpsert(table, data, token) {
  try {
    const r = await fetch(SURL + "/rest/v1/" + table, {
      method: "POST",
      headers: {
        ...authHeaders(token),
        "Prefer": "resolution=merge-duplicates,return=representation"
      },
      body: JSON.stringify(Array.isArray(data) ? data : [data])
    });
    return r.ok ? await r.json() : null;
  } catch {
    return null;
  }
}
async function sDel(table, col, val, token) {
  try {
    await fetch(SURL + "/rest/v1/" + table + "?" + col + "=eq." + val, {
      method: "DELETE",
      headers: authHeaders(token)
    });
  } catch {}
}
